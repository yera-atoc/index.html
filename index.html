<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Level Up PRO</title>
    <style>
        :root { --bg: #05070a; --card: #0d1117; --accent: #58a6ff; --neon: #00ffc3; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        .container { width: 100%; max-width: 400px; }
        .header { text-align: center; margin-bottom: 20px; }
        .stats-card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #30363d; box-shadow: 0 0 20px rgba(0, 255, 195, 0.15); margin-bottom: 20px; text-align: center; }
        .progress-container { background: #30363d; height: 12px; border-radius: 6px; overflow: hidden; margin: 15px 0; }
        #progress-bar { background: linear-gradient(90deg, var(--accent), var(--neon)); height: 100%; width: 0%; transition: width 0.4s ease; box-shadow: 0 0 10px var(--neon); }
        .task-list { list-style: none; padding: 0; }
        .task-item { background: var(--card); margin-bottom: 12px; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--accent); border: 1px solid #30363d; }
        .task-text { border: none; background: transparent; color: white; font-size: 16px; width: 80%; outline: none; }
        .task-text:focus { border-bottom: 1px solid var(--neon); }
        input[type="checkbox"] { width: 24px; height: 24px; cursor: pointer; accent-color: var(--neon); }
        .btn { background: #161b22; color: #8b949e; border: 1px solid #30363d; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn:hover { color: white; border-color: var(--neon); }
        #lvl { font-size: 40px; font-weight: 900; color: var(--neon); display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span id="lvl">LVL 1</span>
        <p style="opacity: 0.7;">Система прокачки жизни</p>
    </div>

    <div class="stats-card">
        <div style="display: flex; justify-content: space-between; font-weight: bold;">
            <span>Прогресс дня</span>
            <span id="percent">0%</span>
        </div>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <button class="btn" onclick="resetDay()">Сбросить день</button>
    </div>

    <ul class="task-list" id="taskList">
        </ul>
    
    <p style="text-align: center; font-size: 12px; color: #8b949e;">Нажми на текст, чтобы изменить задачу</p>
</div>

<script>
    const defaultTasks = ["Утренняя тренировка", "Чтение (20 мин)", "Планирование дня", "Медитация", "Курс обучения"];
    let tasks = JSON.parse(localStorage.getItem('myTasks')) || defaultTasks;
    let stats = JSON.parse(localStorage.getItem('myStats')) || {};

    const taskList = document.getElementById('taskList');

    function renderTasks() {
        taskList.innerHTML = '';
        tasks.forEach((task, i) => {
            const li = document.createElement('li');
            li.className = 'task-item';
            li.innerHTML = `
                <input type="text" class="task-text" value="${task}" onchange="saveTaskName(${i}, this.value)">
                <input type="checkbox" class="task-check" ${stats[i] ? 'checked' : ''} onchange="toggleTask(${i})">
            `;
            taskList.appendChild(li);
        });
        updateUI();
    }

    function saveTaskName(index, value) {
        tasks[index] = value;
        localStorage.setItem('myTasks', JSON.stringify(tasks));
    }

    function toggleTask(index) {
        stats[index] = !stats[index];
        localStorage.setItem('myStats', JSON.stringify(stats));
        updateUI();
    }

    function updateUI() {
        const checkedCount = Object.values(stats).filter(v => v).length;
        const progress = (checkedCount / tasks.length) * 100;
        document.getElementById('progress-bar').style.width = progress + '%';
        document.getElementById('percent').innerText = Math.round(progress) + '%';
        document.getElementById('lvl').innerText = "LVL " + (Math.floor(checkedCount / 2) + 1);
    }

    function resetDay() {
        if(confirm("Сбросить все задачи на сегодня?")) {
            stats = {};
            localStorage.setItem('myStats', JSON.stringify(stats));
            renderTasks();
        }
    }

    renderTasks();
</script>

</body>
</html>
